<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ladakh Gallery Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .viewer {
      width: min(100%, 980px);
      padding: 18px;
      box-sizing: border-box;
    }

    .photo-frame {
      position: relative;
      display: grid;
      place-items: center;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 80vh;
      object-fit: contain;
      background: #000;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .caption {
      margin-top: 14px;
      text-align: center;
      font-size: 0.98rem;
      color: #ddd;
    }

    .instructions {
      margin-bottom: 16px;
      text-align: center;
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="viewer">
    <h1 style="text-align:center; margin-bottom:12px;">Ladakh Photo Viewer</h1>
    <div class="instructions">
      Use the arrows below or your keyboard left/right keys to browse the photos one by one.
    </div>
    <div class="photo-frame">
      <img id="photo" src="" alt="Gallery photo" />
    </div>
    <div class="controls">
      <button id="prev">← Previous</button>
      <button id="next">Next →</button>
    </div>
    <div class="caption" id="caption"></div>
    <div id="driveLink" style="margin-top:8px; text-align:center;"></div>
  </div>

  <script>
    // Google Drive folder ID from: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    const GOOGLE_DRIVE_FOLDER_ID = "1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1";

    // Media files from Google Drive folder: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    // Real file IDs extracted from your Google Drive
    const media = [
      { id: "1LeZTC-29LyeJB4hCuxn8yChHFyzKPQnq", name: "IMG-20260621-WA0009" },
      { id: "1SMGvKO8dZG-vsFL5kSz0Njl9TuJjlcx_", name: "IMG-20260621-WA0015" },
      { id: "1-GuEhQpHCyMeVwSx4w08DBcT7FuXfNaX", name: "IMG-20260621-WA0041" },
      { id: "1lSkWQV8xZdYf17UtUHnQzDrw9gah6KJl", name: "IMG20260614161208" },
      { id: "1oMTPRkoHtne68j2zpQT8pujpuP0bSsEH", name: "IMG20260614161215" },
      { id: "1lShLDpI8_zz1iypHr5pN0U3xPKi_VgZ8", name: "IMG20260614161226" },
      { id: "1Qq4HxEg8NPEN2DEXNoGg9JFQw6Kebu-0", name: "IMG20260614161233" },
      { id: "1ZxMuiRNrnrTmB4YpaH8neyRjeimVwPzw", name: "IMG20260615145008" },
      { id: "19WDUek-lOFzU4l13ahryt3yIkw5TqNpO", name: "IMG20260615145009" },
      { id: "19dJhdbsmI9s_3xER8a-7wM_KWRwFPAZH", name: "IMG20260615145052" },
      { id: "1ylk54ydvy9EosO0_pBlHDl2COJXo7Moa", name: "IMG20260616065446" },
      { id: "16VHVslQ7tQK4vgr37SfITbF74t1lwLZr", name: "IMG20260616071718" },
      { id: "1O3p1XaKKI9JAPbcYPKgZ9Iy1eLBkmgl9", name: "IMG20260616071720" },
      { id: "1Q1CMIQERL6nG4qx3KQTlMyfNaGuVjr58", name: "IMG20260616071837" },
      { id: "1WqVlweOwgAwMmTNGtJwqTiTMdphGWqsw", name: "IMG20260616144520" },
      { id: "1EX4dEqjVlOsEaGPXQb8IA0G6DYnYHkI6", name: "IMG20260616144629" },
      { id: "1VrfNK-X0yPt-NjNHQj2HEy1hoRYw4dLC", name: "IMG20260617143245" },
      { id: "1nr1_yv1pngVVzybnI3m3uC3bjQDmBBk8", name: "IMG20260617143311" },
      { id: "1zZD5IFQhx-gOKIpV9PsbD-56SoHZfA8P", name: "IMG20260617143347" },
      { id: "1uJ50qHRJR4bvbTdXuHt9VdJ5NOtQPxf1", name: "IMG20260617181723" },
      { id: "1WiXQhphtaKPwVkCkin4CiB-8LJ22cM1P", name: "IMG20260617181727" },
      { id: "1YO-CpH2JoYbhWlkdUnUHJ4CzAbFOwObT", name: "IMG20260617205438" },
      { id: "17Nq3MTYgNyqWhwoRR-pJ5FZ6O_8Tn74Y", name: "VID20260614143128" },
      { id: "13vwyyzA07FrZ839jONjzad1Tg3zTBGLQ", name: "VID20260614143350" },
      { id: "1eyuZYApWysMBtqglOgM3CL2rNO1HFyG2", name: "VID20260616071733" },
      { id: "1LZ2ieRIsnEHFnyNQBCAoyWvVS0ExbrWp", name: "VID20260616145012" },
      { id: "1OpouySG-pF19309yTVIsgMnxKkal78WO", name: "VID20260616145149" }
    ];

    let currentIndex = 0;
    const photoElement = document.getElementById("photo");
    const captionElement = document.getElementById("caption");
    const driveLinkElement = document.getElementById("driveLink");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");

    function getMediaSource(item) {
      if (item.id) {
        // Google Drive file - try the canonical preview URL
        return `https://drive.google.com/uc?export=view&id=${item.id}`;
      }
      return item.url; // Local file
    }

    // Show a Drive link so you can open files directly if embedding fails
    function getDriveFileUrl(id) {
      return `https://drive.google.com/file/d/${id}/view`;
    }

    function updateViewer() {
      const item = media[currentIndex];
      photoElement.style.display = '';
      photoElement.src = getMediaSource(item);
      photoElement.alt = `Media ${currentIndex + 1} of ${media.length}`;
      captionElement.textContent = `${currentIndex + 1} / ${media.length} — ${item.name}`;
      // Drive link for manual open (useful when embedding is blocked)
      if (item.id && driveLinkElement) {
        driveLinkElement.innerHTML = `<a href="${getDriveFileUrl(item.id)}" target="_blank" rel="noopener">Open in Google Drive</a>`;
      } else if (driveLinkElement) {
        driveLinkElement.textContent = '';
      }
      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === media.length - 1;
    }

    // If an image fails to load, hide it and leave a Drive link for manual opening
    photoElement.onerror = function () {
      const item = media[currentIndex];
      photoElement.style.display = 'none';
      captionElement.textContent = `Failed to load — open in Google Drive: ${item.name}`;
      if (item.id && driveLinkElement) {
        driveLinkElement.innerHTML = `<a href="${getDriveFileUrl(item.id)}" target="_blank" rel="noopener">Open ${item.name} in Google Drive</a>`;
      }
      console.warn('Failed to load media', item);
    };

    function showNext() {
      if (currentIndex < media.length - 1) {
        currentIndex += 1;
        updateViewer();
      }
    }

    function showPrev() {
      if (currentIndex > 0) {
        currentIndex -= 1;
        updateViewer();
      }
    }

    nextButton.addEventListener("click", showNext);
    prevButton.addEventListener("click", showPrev);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        showNext();
      } else if (event.key === "ArrowLeft") {
        showPrev();
      }
    });

    updateViewer();
  </script>
</body>
</html>
