<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ladakh Gallery Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .viewer {
      width: min(100%, 980px);
      padding: 18px;
      box-sizing: border-box;
    }

    .photo-frame {
      position: relative;
      display: grid;
      place-items: center;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 80vh;
      object-fit: contain;
      background: #000;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .caption {
      margin-top: 14px;
      text-align: center;
      font-size: 0.98rem;
      color: #ddd;
    }

    .instructions {
      margin-bottom: 16px;
      text-align: center;
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="viewer">
    <h1 style="text-align:center; margin-bottom:12px;">Ladakh Photo Viewer</h1>
    <div class="instructions">
      Use the arrows below or your keyboard left/right keys to browse the photos one by one.
    </div>
    <div class="photo-frame">
      <img id="photo" src="" alt="Gallery photo" />
      <!-- Fullscreen overlay -->
      <div id="overlay" style="display:none; position:fixed; inset:0; background:#000; align-items:center; justify-content:center; z-index:9999;">
        <img id="overlayImg" style="max-width:100%; max-height:100%; object-fit:contain;" alt="Full screen" />
      </div>
    </div>
    <div class="controls">
      <button id="prev">← Previous</button>
      <button id="next">Next →</button>
    </div>
    <div class="caption" id="caption"></div>
    <div id="driveLink" style="margin-top:8px; text-align:center;"></div>
  </div>

  <script>
    // Google Drive folder ID from: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    const GOOGLE_DRIVE_FOLDER_ID = "1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1";

    // Use local images when available (download with download_images.ps1)
    const media = [
      { url: "images/IMG-20260621-WA0009.jpg", name: "IMG-20260621-WA0009" },
      { url: "images/IMG-20260621-WA0015.jpg", name: "IMG-20260621-WA0015" },
      { url: "images/IMG-20260621-WA0041.jpg", name: "IMG-20260621-WA0041" },
      { url: "images/IMG20260614161208.jpg", name: "IMG20260614161208" },
      { url: "images/IMG20260614161215.jpg", name: "IMG20260614161215" },
      { url: "images/IMG20260614161226.jpg", name: "IMG20260614161226" },
      { url: "images/IMG20260614161233.jpg", name: "IMG20260614161233" },
      { url: "images/IMG20260615145008.jpg", name: "IMG20260615145008" },
      { url: "images/IMG20260615145009.jpg", name: "IMG20260615145009" },
      { url: "images/IMG20260615145052.jpg", name: "IMG20260615145052" },
      { url: "images/IMG20260616065446.jpg", name: "IMG20260616065446" },
      { url: "images/IMG20260616071718.jpg", name: "IMG20260616071718" },
      { url: "images/IMG20260616071720.jpg", name: "IMG20260616071720" },
      { url: "images/IMG20260616071837.jpg", name: "IMG20260616071837" },
      { url: "images/IMG20260616144520.jpg", name: "IMG20260616144520" },
      { url: "images/IMG20260616144629.jpg", name: "IMG20260616144629" },
      { url: "images/IMG20260617143245.jpg", name: "IMG20260617143245" },
      { url: "images/IMG20260617143311.jpg", name: "IMG20260617143311" },
      { url: "images/IMG20260617143347.jpg", name: "IMG20260617143347" },
      { url: "images/IMG20260617181723.jpg", name: "IMG20260617181723" },
      { url: "images/IMG20260617181727.jpg", name: "IMG20260617181727" },
      { url: "images/IMG20260617205438.jpg", name: "IMG20260617205438" }
    ];

    let currentIndex = 0;
    const photoElement = document.getElementById("photo");
    const captionElement = document.getElementById("caption");
    const driveLinkElement = document.getElementById("driveLink");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");

    function getMediaSource(item) {
      if (item.id) {
        // Google Drive file - try the canonical preview URL
        return `https://drive.google.com/uc?export=view&id=${item.id}`;
      }
      return item.url; // Local file
    }

    // Show a Drive link so you can open files directly if embedding fails
    function getDriveFileUrl(id) {
      return `https://drive.google.com/file/d/${id}/view`;
    }

    function updateViewer() {
      const item = media[currentIndex];
      photoElement.style.display = '';
      photoElement.src = getMediaSource(item);
      photoElement.alt = `Media ${currentIndex + 1} of ${media.length}`;
      captionElement.textContent = `${currentIndex + 1} / ${media.length} — ${item.name}`;
      // Drive link for manual open (useful when embedding is blocked)
      if (item.id && driveLinkElement) {
        driveLinkElement.innerHTML = `<a href="${getDriveFileUrl(item.id)}" target="_blank" rel="noopener">Open in Google Drive</a>`;
      } else if (driveLinkElement) {
        driveLinkElement.textContent = '';
      }
      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === media.length - 1;
    }

    // If an image fails to load, hide it and leave a Drive link for manual opening
    photoElement.onerror = function () {
      const item = media[currentIndex];
      photoElement.style.display = 'none';
      captionElement.textContent = `Failed to load — open in Google Drive: ${item.name}`;
      if (item.id && driveLinkElement) {
        driveLinkElement.innerHTML = `<a href="${getDriveFileUrl(item.id)}" target="_blank" rel="noopener">Open ${item.name} in Google Drive</a>`;
      }
      console.warn('Failed to load media', item);
    };

      // Fullscreen overlay handlers
      const overlay = document.getElementById('overlay');
      const overlayImg = document.getElementById('overlayImg');

      function showFullScreen(src) {
        overlayImg.src = src;
        overlay.style.display = 'grid';
        // Try to request fullscreen on the overlay (works with user gesture)
        try {
          if (overlay.requestFullscreen) overlay.requestFullscreen();
        } catch (e) {
          console.warn('Fullscreen request failed', e);
        }
      }

      function hideFullScreen() {
        overlay.style.display = 'none';
        overlayImg.src = '';
        try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) {}
      }

      // Click image to open fullscreen (if it loaded)
      photoElement.addEventListener('click', () => {
        if (photoElement.src && photoElement.style.display !== 'none') {
          showFullScreen(photoElement.src);
        }
      });

      // Close overlay on click or Escape
      overlay.addEventListener('click', hideFullScreen);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideFullScreen();
      });

    function showNext() {
      if (currentIndex < media.length - 1) {
        currentIndex += 1;
        updateViewer();
      }
    }

    function showPrev() {
      if (currentIndex > 0) {
        currentIndex -= 1;
        updateViewer();
      }
    }

    nextButton.addEventListener("click", showNext);
    prevButton.addEventListener("click", showPrev);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        showNext();
      } else if (event.key === "ArrowLeft") {
        showPrev();
      }
    });

    updateViewer();
  </script>
</body>
</html>
