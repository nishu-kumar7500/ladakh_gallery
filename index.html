<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ladakh Gallery Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .viewer {
      width: min(100%, 980px);
      padding: 18px;
      box-sizing: border-box;
    }

    .photo-frame {
      position: relative;
      display: grid;
      place-items: center;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 80vh;
      object-fit: contain;
      background: #000;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .caption {
      margin-top: 14px;
      text-align: center;
      font-size: 0.98rem;
      color: #ddd;
    }

    .instructions {
      margin-bottom: 16px;
      text-align: center;
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="viewer">
    <h1 style="text-align:center; margin-bottom:12px;">Ladakh Photo Viewer</h1>
    <div class="instructions">
      Use the arrows below or your keyboard left/right keys to browse the photos one by one.
    </div>
    <div class="photo-frame">
      <img id="photo" src="" alt="Gallery photo" />
    </div>
    <div class="controls">
      <button id="prev">← Previous</button>
      <button id="next">Next →</button>
    </div>
    <div class="caption" id="caption"></div>
  </div>

  <script>
    // Google Drive folder ID from: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    const GOOGLE_DRIVE_FOLDER_ID = "1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1";

    // Media files from Google Drive folder: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    // To get file IDs: right-click file -> Get link -> extract ID from URL
    const media = [
      { id: "1ABC123DEF456GHI789JKL012MNO345PQR", name: "IMG-20260621-WA0009" },
      { id: "1BCD234EFG567HIJ890KLM123NOP456QRS", name: "IMG-20260621-WA0015" },
      { id: "1CDE345FGH678IJK901LMN234OPQ567RST", name: "IMG-20260621-WA0041" },
      { id: "1DEF456GHI789JKL012MNO345PQR678STU", name: "IMG20260614161208" },
      { id: "1EFG567HIJ890KLM123NOP456QRS789TUV", name: "IMG20260614161215" },
      { id: "1FGH678IJK901LMN234OPQ567RST890UVW", name: "IMG20260614161226" },
      { id: "1GHI789JKL012MNO345PQR678STU901VWX", name: "IMG20260614161233" },
      { id: "1HIJ890KLM123NOP456QRS789TUV012WXY", name: "IMG20260615145008" },
      { id: "1IJK901LMN234OPQ567RST890UVW123XYZ", name: "IMG20260615145009" },
      { id: "1JKL012MNO345PQR678STU901VWX234YZA", name: "IMG20260615145052" },
      { id: "1KLM123NOP456QRS789TUV012WXY345ZAB", name: "IMG20260616065446" },
      { id: "1LMN234OPQ567RST890UVW123XYZ456ABC", name: "IMG20260616071718" },
      { id: "1MNO345PQR678STU901VWX234YZA567BCD", name: "IMG20260616071720" },
      { id: "1NOP456QRS789TUV012WXY345ZAB678CDE", name: "IMG20260616071837" },
      { id: "1OPQ567RST890UVW123XYZ456ABC789DEF", name: "IMG20260616144520" },
      { id: "1PQR678STU901VWX234YZA567BCD890EFG", name: "IMG20260616144629" },
      { id: "1QRS789TUV012WXY345ZAB678CDE901FGH", name: "IMG20260617143245" },
      { id: "1RST890UVW123XYZ456ABC789DEF012GHI", name: "IMG20260617143311" },
      { id: "1STU901VWX234YZA567BCD890EFG123HIJ", name: "IMG20260617143347" },
      { id: "1TUV012WXY345ZAB678CDE901FGH234IJK", name: "IMG20260617181723" },
      { id: "1UVW123XYZ456ABC789DEF012GHI345JKL", name: "IMG20260617181727" },
      { id: "1VWX234YZA567BCD890EFG123HIJ456KLM", name: "IMG20260617205438" },
      { id: "1WXY345ZAB678CDE901FGH234IJK567LMN", name: "VID20260614143128 (Video)" },
      { id: "1XYZ456ABC789DEF012GHI345JKL678MNO", name: "VID20260614143350 (Video)" },
      { id: "1YZA567BCD890EFG123HIJ456KLM789NOP", name: "VID20260616071733 (Video)" }
    ];

    // ⚠️ IMPORTANT: Replace the placeholder file IDs above with actual IDs from your Google Drive
    // Steps to get real file IDs:
    // 1. Visit: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    // 2. Right-click each file → "Get link"
    // 3. Copy the URL: https://drive.google.com/file/d/FILE_ID_HERE/view?usp=sharing
    // 4. Extract FILE_ID and replace above

    let currentIndex = 0;
    const photoElement = document.getElementById("photo");
    const captionElement = document.getElementById("caption");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");

    function getMediaSource(item) {
      if (item.id) {
        // Google Drive file - direct preview link
        return `https://drive.google.com/uc?id=${item.id}&export=view`;
      }
      return item.url; // Local file
    }

    function updateViewer() {
      const item = media[currentIndex];
      photoElement.src = getMediaSource(item);
      photoElement.alt = `Media ${currentIndex + 1} of ${media.length}`;
      captionElement.textContent = `${currentIndex + 1} / ${media.length} — ${item.name}`;
      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === media.length - 1;
    }

    function showNext() {
      if (currentIndex < media.length - 1) {
        currentIndex += 1;
        updateViewer();
      }
    }

    function showPrev() {
      if (currentIndex > 0) {
        currentIndex -= 1;
        updateViewer();
      }
    }

    nextButton.addEventListener("click", showNext);
    prevButton.addEventListener("click", showPrev);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        showNext();
      } else if (event.key === "ArrowLeft") {
        showPrev();
      }
    });

    updateViewer();
  </script>
</body>
</html>
