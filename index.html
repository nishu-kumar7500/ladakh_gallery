<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ladakh Gallery Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .viewer {
      width: min(100%, 980px);
      padding: 18px;
      box-sizing: border-box;
    }

    .photo-frame {
      position: relative;
      display: grid;
      place-items: center;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 80vh;
      object-fit: contain;
      background: #000;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .caption {
      margin-top: 14px;
      text-align: center;
      font-size: 0.98rem;
      color: #ddd;
    }

    .instructions {
      margin-bottom: 16px;
      text-align: center;
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="viewer">
    <h1 style="text-align:center; margin-bottom:12px;">Ladakh Photo Viewer</h1>
    <div class="instructions">
      Use the arrows below or your keyboard left/right keys to browse the photos one by one.
    </div>
    <div class="photo-frame">
      <img id="photo" src="" alt="Gallery photo" />
      <video id="video" src="" controls style="display:none; width:100%; max-height:80vh; background:#000;" ></video>
      <!-- Fullscreen overlay -->
      <div id="overlay" style="display:none; position:fixed; inset:0; background:#000; align-items:center; justify-content:center; z-index:9999;">
        <img id="overlayImg" style="max-width:100%; max-height:100%; object-fit:contain;" alt="Full screen" />
      </div>
    </div>
    <div class="controls">
      <button id="prev">← Previous</button>
      <button id="next">Next →</button>
    </div>
    <div class="caption" id="caption"></div>
    <div id="driveLink" style="margin-top:8px; text-align:center;"></div>
  </div>

  <script>
    // Google Drive folder ID from: https://drive.google.com/drive/u/2/folders/1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1
    const GOOGLE_DRIVE_FOLDER_ID = "1mBdYXcJtQmenhwume_qkajPpkoQU9Tw1";

    // ImageKit base URL (set this to your account's delivery URL)
    // Example: const IMAGEKIT_BASE_URL = 'https://ik.imagekit.io/your_imagekit_id';
    const IMAGEKIT_BASE_URL = "";

    // Media list — replace file names if needed. If IMAGEKIT_BASE_URL is set,
    // files are loaded from ImageKit as `${IMAGEKIT_BASE_URL}/${item.file}`.
    // You can also include full `url` entries to point to any absolute URL.
    const media = [
      { file: "IMG-20260621-WA0009.jpg", name: "IMG-20260621-WA0009" },
      { file: "IMG-20260621-WA0015.jpg", name: "IMG-20260621-WA0015" },
      { file: "IMG-20260621-WA0041.jpg", name: "IMG-20260621-WA0041" },
      { file: "IMG20260614161208.jpg", name: "IMG20260614161208" },
      { file: "IMG20260614161215.jpg", name: "IMG20260614161215" },
      { file: "IMG20260614161226.jpg", name: "IMG20260614161226" },
      { file: "IMG20260614161233.jpg", name: "IMG20260614161233" },
      { file: "IMG20260615145008.jpg", name: "IMG20260615145008" },
      { file: "IMG20260615145009.jpg", name: "IMG20260615145009" },
      { file: "IMG20260615145052.jpg", name: "IMG20260615145052" },
      { file: "IMG20260616065446.jpg", name: "IMG20260616065446" },
      { file: "IMG20260616071718.jpg", name: "IMG20260616071718" },
      { file: "IMG20260616071720.jpg", name: "IMG20260616071720" },
      { file: "IMG20260616071837.jpg", name: "IMG20260616071837" },
      { file: "IMG20260616144520.jpg", name: "IMG20260616144520" },
      { file: "IMG20260616144629.jpg", name: "IMG20260616144629" },
      { file: "IMG20260617143245.jpg", name: "IMG20260617143245" },
      { file: "IMG20260617143311.jpg", name: "IMG20260617143311" },
      { file: "IMG20260617143347.jpg", name: "IMG20260617143347" },
      { file: "IMG20260617181723.jpg", name: "IMG20260617181723" },
      { file: "IMG20260617181727.jpg", name: "IMG20260617181727" },
      { file: "IMG20260617205438.jpg", name: "IMG20260617205438" },
      // example video entries
      { file: "VID20260614143128.mp4", name: "VID20260614143128" },
      { file: "VID20260614143350.mp4", name: "VID20260614143350" }
    ];

    let currentIndex = 0;
    const photoElement = document.getElementById("photo");
    const videoElement = document.getElementById("video");
    const captionElement = document.getElementById("caption");
    const driveLinkElement = document.getElementById("driveLink");
    const nextButton = document.getElementById("next");
    const prevButton = document.getElementById("prev");

    // Return an array of possible Drive URLs for an ID (tries multiple variants)
    function getDriveSources(id) {
      return [
        `https://drive.google.com/uc?export=view&id=${id}`,
        `https://drive.google.com/uc?export=download&id=${id}`,
        `https://drive.google.com/thumbnail?id=${id}`,
        `https://drive.google.com/thumbnail?sz=w1200&id=${id}`
      ];
    }

    function getMediaSource(item) {
      // explicit full URL wins
      if (item.url) return item.url;
      // ImageKit delivery if configured
      if (IMAGEKIT_BASE_URL && item.file) return `${IMAGEKIT_BASE_URL}/${item.file}`;
      // Drive fallback if id present
      if (item.id) return getDriveSources(item.id)[0];
      // local images folder fallback
      if (item.file) return `images/${item.file}`;
      return '';
    }

    // Show a Drive link so you can open files directly if embedding fails
    function getDriveFileUrl(id) {
      return `https://drive.google.com/file/d/${id}/view`;
    }

    function updateViewer() {
      const item = media[currentIndex];
      const src = getMediaSource(item);
      const isVideo = /\.(mp4|webm|ogg)$/i.test(src) || (item.file && /\.(mp4|webm|ogg)$/i.test(item.file));

      // hide both initially
      photoElement.style.display = 'none';
      videoElement.style.display = 'none';

      if (isVideo) {
        videoElement.src = src;
        videoElement.style.display = '';
        videoElement.load();
      } else {
        // If item has a Drive id and no IMAGEKIT_BASE_URL, try multiple Drive sources
        if (item.id && !IMAGEKIT_BASE_URL) {
          tryDriveSources(item);
        } else {
          photoElement.src = src;
          photoElement.style.display = '';
        }
      }

      captionElement.textContent = `${currentIndex + 1} / ${media.length} — ${item.name}`;

      if (item.id && driveLinkElement) {
        driveLinkElement.innerHTML = `<a href="${getDriveFileUrl(item.id)}" target="_blank" rel="noopener">Open in Google Drive</a>`;
      } else if (IMAGEKIT_BASE_URL && item.file && driveLinkElement) {
        driveLinkElement.innerHTML = `<a href="${IMAGEKIT_BASE_URL}/${item.file}" target="_blank" rel="noopener">Open in ImageKit</a>`;
      } else if (driveLinkElement) {
        driveLinkElement.textContent = '';
      }

      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === media.length - 1;
    }

    // Try multiple Drive URL variants before failing
    function tryDriveSources(item) {
      const sources = getDriveSources(item.id || '');
      let attempt = 0;

      function tryNext() {
        if (attempt >= sources.length) {
          // all failed
          photoElement.style.display = 'none';
          videoElement.style.display = 'none';
          captionElement.textContent = `Failed to load — open in Google Drive: ${item.name}`;
          if (item.id && driveLinkElement) {
            driveLinkElement.innerHTML = `<a href="${getDriveFileUrl(item.id)}" target="_blank" rel="noopener">Open ${item.name} in Google Drive</a>`;
          }
          console.warn('All Drive source attempts failed for', item);
          return;
        }

        const src = sources[attempt++];
        const isVideo = /\.(mp4|webm|ogg)$/i.test(src) || (item.file && /\.(mp4|webm|ogg)$/i.test(item.file));

        if (isVideo) {
          videoElement.style.display = '';
          videoElement.src = src;
          videoElement.onerror = () => { console.warn('Drive video source failed, trying next:', src); tryNext(); };
          videoElement.onloadeddata = () => { videoElement.onerror = null; };
        } else {
          photoElement.style.display = '';
          photoElement.src = src;
          photoElement.onerror = () => { console.warn('Drive image source failed, trying next:', src); tryNext(); };
          photoElement.onload = () => { photoElement.onerror = null; };
        }
      }

      tryNext();
    }

      // Fullscreen overlay handlers
      const overlay = document.getElementById('overlay');
      const overlayImg = document.getElementById('overlayImg');

      function showFullScreen(src) {
        overlayImg.src = src;
        overlay.style.display = 'grid';
        // Try to request fullscreen on the overlay (works with user gesture)
        try {
          if (overlay.requestFullscreen) overlay.requestFullscreen();
        } catch (e) {
          console.warn('Fullscreen request failed', e);
        }
      }

      function hideFullScreen() {
        overlay.style.display = 'none';
        overlayImg.src = '';
        try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) {}
      }

      // Click image to open fullscreen (if it loaded)
      photoElement.addEventListener('click', () => {
        if (photoElement.src && photoElement.style.display !== 'none') {
          showFullScreen(photoElement.src);
        }
      });

      // Close overlay on click or Escape
      overlay.addEventListener('click', hideFullScreen);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideFullScreen();
      });

    function showNext() {
      if (currentIndex < media.length - 1) {
        currentIndex += 1;
        updateViewer();
      }
    }

    function showPrev() {
      if (currentIndex > 0) {
        currentIndex -= 1;
        updateViewer();
      }
    }

    nextButton.addEventListener("click", showNext);
    prevButton.addEventListener("click", showPrev);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        showNext();
      } else if (event.key === "ArrowLeft") {
        showPrev();
      }
    });

    updateViewer();
  </script>
</body>
</html>
